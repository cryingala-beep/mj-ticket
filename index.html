<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문학과지성사 티켓 배분 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root {
  --bg: #faf9f6;
  --card: #ffffff;
  --border: #e8e4dc;
  --text: #1a1814;
  --text-sub: #6b6660;
  --text-hint: #9e9a94;
  --accent: #2d5a3d;
  --accent-light: #eaf2ec;
  --accent-mid: #4a8c5c;
  --warn: #92400e;
  --warn-bg: #fef3c7;
  --danger: #991b1b;
  --danger-bg: #fee2e2;
  --success: #166534;
  --success-bg: #dcfce7;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.header {
  background: var(--accent);
  padding: 1.75rem 2.5rem 1.25rem;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1rem; }
.header-title { font-family: 'Noto Serif KR', serif; font-size: 1.35rem; font-weight: 600; color: #fff; letter-spacing: -0.02em; }
.header-sub { font-size: 0.75rem; color: rgba(255,255,255,0.6); margin-top: 3px; font-weight: 300; }
.header-stats { display: flex; gap: 1.5rem; align-items: center; }
.stat-pill { text-align: center; }
.stat-pill-num { font-size: 1.5rem; font-weight: 700; color: #fff; line-height: 1; }
.stat-pill-label { font-size: 0.68rem; color: rgba(255,255,255,0.6); margin-top: 2px; }
.stat-div { width: 1px; height: 32px; background: rgba(255,255,255,0.2); }
.prog-wrap { background: rgba(255,255,255,0.15); border-radius: 99px; height: 5px; overflow: hidden; }
.prog-fill { height: 100%; background: #fff; border-radius: 99px; transition: width 0.4s ease; }
.prog-label { display: flex; justify-content: space-between; margin-top: 4px; font-size: 0.68rem; color: rgba(255,255,255,0.55); }

/* MAIN */
.btn-sm {
  height: 30px; padding: 0 12px;
  background: var(--accent); color: #fff; border: none; border-radius: 5px;
  font-size: 0.76rem; cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  display: flex; align-items: center; gap: 4px; transition: background 0.15s; white-space: nowrap;
}
.btn-sm:hover { background: var(--accent-mid); }
.main { padding: 1.5rem 2.5rem 4rem; max-width: 1100px; margin: 0 auto; }
.toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.total-info { font-size: 0.78rem; color: var(--text-hint); }

/* TABLE */
.table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: visible; }
table { width: 100%; border-collapse: collapse; font-size: 0.83rem; table-layout: fixed; }
tbody { overflow: visible; }

/* 열 너비 */
col.c-num   { width: 44px; }
col.c-dept  { width: 100px; }
col.c-name  { width: 160px; }
col.c-rcpt  { width: 180px; }
col.c-cont  { width: 170px; }
col.c-qty   { width: 90px; }
col.c-del   { width: 36px; }

/* 헤더 — 2단 구조 */
thead tr.th-top th,
thead tr.th-sub th {
  background: var(--bg);
  font-size: 0.68rem; font-weight: 700; color: var(--text-hint);
  letter-spacing: 0.05em; text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  padding: 0;
}
thead tr.th-top th { padding-top: 9px; padding-bottom: 0; text-align: center; }
thead tr.th-top th.align-left { text-align: left; padding-left: 12px; }
thead tr.th-sub th { padding-top: 4px; padding-bottom: 8px; text-align: center; border-top: none; }
thead tr.th-sub th.align-left { text-align: left; padding-left: 12px; }

/* 티켓받으시는분 그룹 헤더 밑줄 구분 */
.th-group-label { border-bottom: 1px solid var(--border-strong, #ccc8be) !important; }
thead tr.th-top th.th-ticket-top {
  border-bottom: none !important;
  border-left: 1px solid var(--border);
}
thead tr.th-sub th.th-rcpt,
thead tr.th-sub th.th-cont {
  border-left: none;
}
thead tr.th-sub th.th-rcpt { border-left: 1px solid var(--border); }

/* 그룹 구분선 */
td.td-rcpt { border-left: 1px solid var(--border); }

tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #f9f8f5; }
td { padding: 8px 12px; vertical-align: middle; overflow: hidden; }
td.td-center { text-align: center; }

/* AUTOCOMPLETE */
.ac-wrap { position: relative; }
.ac-input {
  width: 100%; border: 1px solid transparent; border-radius: 5px;
  padding: 5px 8px; font-size: 0.82rem; font-family: 'Noto Sans KR', sans-serif;
  color: var(--text); background: transparent; transition: border-color 0.15s, background 0.15s;
}
.ac-input:hover { border-color: var(--border); background: var(--bg); }
.ac-input:focus { outline: none; border-color: var(--accent-mid); background: #fff; }
.ac-input::placeholder { color: var(--text-hint); }
.ac-input.selected { font-weight: 500; }

.ac-dropdown {
  position: fixed;
  width: 280px;
  background: #fff; border: 1px solid var(--border); border-radius: 9px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.14); z-index: 9999;
  max-height: 240px; overflow-y: auto; display: none;
}
.ac-dropdown.open { display: block; }
.ac-item {
  padding: 9px 14px; cursor: pointer; display: flex; align-items: center; gap: 9px;
  font-size: 0.82rem; transition: background 0.1s;
}
.ac-item:first-child { border-radius: 9px 9px 0 0; }
.ac-item:last-child  { border-radius: 0 0 9px 9px; }
.ac-item:hover, .ac-item.active { background: var(--accent-light); }
.ac-dept-tag {
  font-size: 0.68rem; color: var(--accent); background: var(--accent-light);
  padding: 2px 8px; border-radius: 99px; flex-shrink: 0; white-space: nowrap;
}
.ac-name { color: var(--text); font-weight: 500; }

/* DEPT CELL */
.dept-cell {
  font-size: 0.75rem; color: var(--text-hint);
  background: var(--bg); padding: 3px 7px; border-radius: 4px;
  white-space: nowrap; display: inline-block;
}

/* CELL INPUT */
.cell-input {
  width: 100%; border: 1px solid transparent; border-radius: 5px;
  padding: 5px 8px; font-size: 0.82rem; font-family: 'Noto Sans KR', sans-serif;
  color: var(--text); background: transparent; transition: border-color 0.15s, background 0.15s;
}
.cell-input:hover { border-color: var(--border); background: var(--bg); }
.cell-input:focus { outline: none; border-color: var(--accent-mid); background: #fff; }
.cell-input::placeholder { color: var(--text-hint); }

/* QTY */
.qty-wrap { display: flex; align-items: center; gap: 5px; justify-content: center; }
.qty-btn {
  width: 22px; height: 22px; border: 1px solid var(--border); border-radius: 4px;
  background: var(--bg); color: var(--text-sub); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 13px;
  transition: all 0.1s; flex-shrink: 0;
}
.qty-btn:hover { border-color: var(--accent-mid); color: var(--accent); background: var(--accent-light); }
.qty-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.qty-num { font-size: 0.88rem; font-weight: 600; min-width: 20px; text-align: center; }

/* STATUS */
.status-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 0.68rem; padding: 2px 7px; border-radius: 99px; font-weight: 500; white-space: nowrap;
}
.s-empty   { background: #f0ede6; color: var(--text-hint); }
.s-pending { background: var(--warn-bg); color: var(--warn); }
.s-done    { background: var(--success-bg); color: var(--success); }

/* DELETE */
.btn-del {
  width: 26px; height: 26px; border: 1px solid var(--border); border-radius: 5px;
  background: transparent; cursor: pointer; color: var(--text-hint);
  display: flex; align-items: center; justify-content: center; font-size: 13px;
  transition: all 0.1s; margin: auto;
}
.btn-del:hover { border-color: #fca5a5; color: var(--danger); background: var(--danger-bg); }

/* ROW SAVE */
.btn-row-save {
  width: 30px; height: 30px; border: 1px solid var(--border); border-radius: 6px;
  background: transparent; cursor: pointer; color: var(--text-hint);
  display: flex; align-items: center; justify-content: center; font-size: 14px;
  transition: all 0.15s; margin: auto;
}
.btn-row-save:hover { border-color: var(--accent-mid); color: var(--accent); background: var(--accent-light); }
.btn-row-save.saved { border-color: var(--accent-mid); color: var(--accent); background: var(--accent-light); }
.btn-row-save:disabled { opacity: 0.4; cursor: not-allowed; }

/* TOAST */
.toast {
  position: fixed; bottom: 2rem; right: 2rem;
  padding: 0.7rem 1.1rem; border-radius: 8px; font-size: 0.8rem;
  font-family: 'Noto Sans KR', sans-serif;
  display: flex; align-items: center; gap: 7px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; z-index: 9999;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: var(--success-bg); color: var(--success); }
.toast.error   { background: var(--danger-bg);  color: var(--danger); }
.toast.info    { background: var(--accent-light); color: var(--accent); }

@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* ADD ROW button */
.btn-add-row {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 16px; margin: 8px 12px;
  background: transparent; border: 1px dashed var(--border);
  border-radius: 6px; color: var(--text-hint); font-size: 0.78rem; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s;
}
.btn-add-row:hover { border-color: var(--accent-mid); color: var(--accent); background: var(--accent-light); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">🎟 문학과지성사 티켓 배분 관리</div>
      <div class="header-sub">무료 티켓 배분 현황</div>
    </div>
    <div class="header-stats">
      <div class="stat-pill">
        <div class="stat-pill-num" id="stat-used">0</div>
        <div class="stat-pill-label">사용된 티켓</div>
      </div>
      <div class="stat-div"></div>
      <div class="stat-pill">
        <div class="stat-pill-num" id="stat-remain">60</div>
        <div class="stat-pill-label">남은 티켓</div>
      </div>
      <div class="stat-div"></div>
      <div class="stat-pill">
        <div class="stat-pill-num">60</div>
        <div class="stat-pill-label">총 수량</div>
      </div>
    </div>
  </div>
  <div class="prog-wrap">
    <div class="prog-fill" id="prog-fill" style="width:0%"></div>
  </div>
  <div class="prog-label">
    <span id="prog-left">사용 0장</span>
    <span id="prog-right">잔여 60장</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="toolbar">
    <span class="total-info" id="total-info">총 0건 입력됨</span>
    <button class="btn-sm" onclick="addRow()">
      <i class="ti ti-plus" aria-hidden="true"></i> 행 추가
    </button>
  </div>

  <div class="table-wrap">
    <table id="main-table">
      <colgroup>
        <col class="c-num">
        <col class="c-dept">
        <col class="c-name">
        <col class="c-rcpt">
        <col class="c-cont">
        <col class="c-qty">
        <col class="c-del">
      </colgroup>
      <thead>
        <!-- 상단 헤더 행 -->
        <tr class="th-top">
          <th class="align-left" rowspan="2" style="vertical-align:middle; padding-left:12px;">#</th>
          <th class="align-left" rowspan="2" style="vertical-align:middle; padding-left:12px;">부서</th>
          <th class="align-left" rowspan="2" style="vertical-align:middle; padding-left:12px;">직원 이름</th>
          <th colspan="2" class="th-ticket-top" style="text-align:center; padding-bottom:6px; border-left:1px solid var(--border);">티켓 받으시는 분</th>
          <th rowspan="2" style="vertical-align:middle; text-align:center;">수량</th>
          <th rowspan="2" style="vertical-align:middle;"></th>
        </tr>
        <!-- 하단 서브헤더 행 -->
        <tr class="th-sub">
          <th class="th-rcpt" style="text-align:center; border-left:1px solid var(--border);">성함</th>
          <th class="th-cont" style="text-align:center;">연락처</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <button class="btn-add-row" onclick="addRow()">
      <i class="ti ti-plus" aria-hidden="true" style="font-size:13px;"></i> 행 추가
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TOTAL = 60;
const MAX_PER = 5;

const EMPLOYEES = [
  {dept:'경영관리팀', name:'김이슬'},
  {dept:'경영관리팀', name:'한진희'},
  {dept:'경영관리팀', name:'이채희'},
  {dept:'저작권팀',   name:'윤서희'},
  {dept:'저작권팀',   name:'권민정'},
  {dept:'디자인센터', name:'이경진'},
  {dept:'디자인센터', name:'조슬기'},
  {dept:'디자인센터', name:'유자경'},
  {dept:'디자인센터', name:'김은혜'},
  {dept:'디자인센터', name:'김보경'},
  {dept:'제작팀',     name:'강병석'},
  {dept:'마케팅팀',   name:'이가은'},
  {dept:'마케팅팀',   name:'최지애'},
  {dept:'마케팅팀',   name:'허황'},
  {dept:'마케팅팀',   name:'남미리'},
  {dept:'마케팅팀',   name:'맹정현'},
  {dept:'편집1부',    name:'김필균'},
  {dept:'편집1부',    name:'허단'},
  {dept:'편집1부',    name:'유하은'},
  {dept:'편집1부',    name:'김다연'},
  {dept:'편집1부',    name:'윤소진'},
  {dept:'편집1부',    name:'조아혜'},
  {dept:'편집1부',    name:'한수예'},
  {dept:'편집2부',    name:'김현주'},
  {dept:'편집2부',    name:'최대연'},
  {dept:'편집2부',    name:'홍근철'},
  {dept:'편집3부',    name:'문지현'},
  {dept:'편집3부',    name:'박지현'},
  {dept:'편집3부',    name:'김은주'}
];

let rows = [];
let rowIdCounter = 0;

function initData() {
  const saved = localStorage.getItem('mji_ticket_rows_v3');
  if (saved) {
    try {
      rows = JSON.parse(saved);
      rowIdCounter = rows.reduce((m, r) => Math.max(m, r.id || 0), 0) + 1;
    } catch(e) { rows = []; }
  }
  // 빈 행이 없으면 항상 1개 추가
  ensureEmptyRow();
}

function ensureEmptyRow() {
  const lastRow = rows[rows.length - 1];
  if (!lastRow || lastRow.name || lastRow.recipient || lastRow.contact || lastRow.qty > 0) {
    const row = { id: rowIdCounter++, dept: '', name: '', recipient: '', contact: '', qty: 0 };
    rows.push(row);
  }
}

function saveData() {
  localStorage.setItem('mji_ticket_rows_v3', JSON.stringify(rows));
  updateStats();
  updateTotalInfo();
}

function getUsed() {
  return rows.reduce((s, r) => s + (r.qty || 0), 0);
}

function updateStats() {
  const used = getUsed();
  const remain = TOTAL - used;
  document.getElementById('stat-used').textContent = used;
  document.getElementById('stat-remain').textContent = Math.max(0, remain);
  const pct = Math.min(100, (used / TOTAL) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-left').textContent = `사용 ${used}장`;
  document.getElementById('prog-right').textContent = `잔여 ${Math.max(0, remain)}장`;
}

function updateTotalInfo() {
  const filled = rows.filter(r => r.name).length;
  document.getElementById('total-info').textContent = `총 ${filled}건 입력됨`;
}

function getStatus(row) {
  if (!row.name && !row.recipient && !row.contact && !row.qty) return 'empty';
  if (row.qty > 0 && row.recipient) return 'done';
  return 'pending';
}

function statusBadge(row) {
  const s = getStatus(row);
  if (s === 'empty') return `<span class="status-badge s-empty">미입력</span>`;
  if (s === 'done')  return `<span class="status-badge s-done"><i class="ti ti-check" aria-hidden="true" style="font-size:10px;"></i> 완료</span>`;
  return `<span class="status-badge s-pending"><i class="ti ti-clock" aria-hidden="true" style="font-size:10px;"></i> 진행중</span>`;
}

function addRow(doSave = true) {
  ensureEmptyRow();
  const newRow = rows[rows.length - 1];
  appendRowToDOM(newRow);
  if (doSave) saveData();
  refreshRowNumbers();
}

function appendRowToDOM(row) {
  const tbody = document.getElementById('table-body');
  const tr = buildTR(row);
  tbody.appendChild(tr);
}

function buildTR(row) {
  const used = getUsed();
  const remain = TOTAL - used;
  const canAdd = remain > 0 && row.qty < MAX_PER;
  const canSub = row.qty > 0;
  const deptHtml = row.dept
    ? `<span class="dept-cell">${row.dept}</span>`
    : `<span style="color:var(--text-hint);font-size:0.75rem;">—</span>`;

  const tr = document.createElement('tr');
  tr.id = `tr-${row.id}`;
  tr.innerHTML = `
    <td class="td-center" style="color:var(--text-hint);font-size:0.75rem;" id="num-${row.id}"></td>
    <td id="dept-cell-${row.id}">${deptHtml}</td>
    <td>
      <div class="ac-wrap" id="ac-wrap-${row.id}">
        <input class="ac-input${row.name ? ' selected' : ''}" id="ac-input-${row.id}"
          type="text" placeholder="이름 검색..."
          value="${row.name || ''}"
          autocomplete="off"
          oninput="onAcInput(${row.id}, this.value)"
          onfocus="onAcFocus(${row.id})"
          onkeydown="onAcKey(event, ${row.id})">
        <div class="ac-dropdown" id="ac-dd-${row.id}"></div>
      </div>
    </td>
    <td class="td-rcpt">
      <input class="cell-input" type="text" placeholder="성함 입력"
        value="${row.recipient || ''}"
        oninput="updateRowField(${row.id}, 'recipient', this.value)">
    </td>
    <td>
      <input class="cell-input" type="text" placeholder="010-0000-0000"
        value="${row.contact || ''}"
        oninput="onContactInput(${row.id}, this)">
    </td>
    <td class="td-center" id="qty-wrap-wrap-${row.id}">
      <div class="qty-wrap" id="qty-wrap-${row.id}">
        <button class="qty-btn" onclick="changeRowQty(${row.id}, -1)" ${canSub ? '' : 'disabled'}>−</button>
        <span class="qty-num">${row.qty}</span>
        <button class="qty-btn" onclick="changeRowQty(${row.id}, 1)" ${canAdd ? '' : 'disabled'}>+</button>
      </div>
    </td>
    <td>
      <button class="btn-del" onclick="deleteRow(${row.id})" title="삭제">
        <i class="ti ti-trash" aria-hidden="true"></i>
      </button>
    </td>
  `;
  return tr;
}

function renderAll() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  rows.forEach(row => tbody.appendChild(buildTR(row)));
  refreshRowNumbers();
  updateStats();
  updateTotalInfo();
}

/* ─── Autocomplete ─── */
let acActiveIdx = {};

function onAcInput(id, val) {
  acActiveIdx[id] = -1;
  showDropdown(id, val);
}

function onAcFocus(id) {
  activeAcId = id;
  const val = document.getElementById(`ac-input-${id}`).value;
  showDropdown(id, val);
}

function showDropdown(id, val) {
  const dd = document.getElementById(`ac-dd-${id}`);
  const inp = document.getElementById(`ac-input-${id}`);
  const q = val.trim();
  const filtered = q === ''
    ? EMPLOYEES
    : EMPLOYEES.filter(e => e.name.includes(q) || e.dept.includes(q));

  if (filtered.length === 0) { dd.classList.remove('open'); dd.innerHTML = ''; return; }

  dd.innerHTML = filtered.map((e, i) =>
    `<div class="ac-item" data-idx="${i}" data-name="${e.name}" data-dept="${e.dept}"
      onmousedown="selectEmployee(${id}, '${e.name}', '${e.dept}')"
      onmouseover="setAcActive(${id}, ${i})">
      <span class="ac-dept-tag">${e.dept}</span>
      <span class="ac-name">${e.name}</span>
    </div>`
  ).join('');

  // 입력창 위치 기준으로 fixed 좌표 설정
  const rect = inp.getBoundingClientRect();
  dd.style.top  = (rect.bottom + 4) + 'px';
  dd.style.left = rect.left + 'px';
  dd.style.width = Math.max(280, rect.width) + 'px';

  dd.classList.add('open');
}

function setAcActive(id, idx) {
  acActiveIdx[id] = idx;
  const dd = document.getElementById(`ac-dd-${id}`);
  dd.querySelectorAll('.ac-item').forEach((el, i) => el.classList.toggle('active', i === idx));
}

function onAcKey(e, id) {
  const dd = document.getElementById(`ac-dd-${id}`);
  const items = dd.querySelectorAll('.ac-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acActiveIdx[id] = Math.min((acActiveIdx[id] ?? -1) + 1, items.length - 1);
    setAcActive(id, acActiveIdx[id]);
    items[acActiveIdx[id]].scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acActiveIdx[id] = Math.max((acActiveIdx[id] ?? 0) - 1, 0);
    setAcActive(id, acActiveIdx[id]);
    items[acActiveIdx[id]].scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'Enter') {
    e.preventDefault();
    const idx = (acActiveIdx[id] >= 0) ? acActiveIdx[id] : 0;
    const item = items[idx];
    if (item) selectEmployee(id, item.dataset.name, item.dataset.dept);
  } else if (e.key === 'Escape') {
    dd.classList.remove('open');
  }
}

function selectEmployee(id, name, dept) {
  const row = rows.find(r => r.id === id);
  if (!row) return;
  row.name = name;
  row.dept = dept;

  const inp = document.getElementById(`ac-input-${id}`);
  inp.value = name;
  inp.classList.add('selected');
  document.getElementById(`ac-dd-${id}`).classList.remove('open');

  document.getElementById(`dept-cell-${id}`).innerHTML =
    `<span class="dept-cell">${dept}</span>`;

  updateStatusCell(id);
  saveData();
  refreshRowNumbers();
  autoSync(id);

  // 마지막 행이 채워졌으면 새 빈 행 자동 추가
  const lastRow = rows[rows.length - 1];
  if (lastRow.name) {
    const newRow = { id: rowIdCounter++, dept: '', name: '', recipient: '', contact: '', qty: 0 };
    rows.push(newRow);
    appendRowToDOM(newRow);
    saveData();
    refreshRowNumbers();
  }
}

document.addEventListener('click', e => {
  if (!e.target.closest('.ac-wrap'))
    document.querySelectorAll('.ac-dropdown').forEach(d => d.classList.remove('open'));
});

// 스크롤 시 드롭다운 위치 갱신
let activeAcId = null;
window.addEventListener('scroll', () => {
  if (activeAcId !== null) {
    const inp = document.getElementById(`ac-input-${activeAcId}`);
    const dd  = document.getElementById(`ac-dd-${activeAcId}`);
    if (inp && dd && dd.classList.contains('open')) {
      const rect = inp.getBoundingClientRect();
      dd.style.top  = (rect.bottom + 4) + 'px';
      dd.style.left = rect.left + 'px';
    }
  }
}, true);

/* ─── Row operations ─── */
function formatPhone(val) {
  const d = val.replace(/\D/g, '').slice(0, 11);
  if (d.length <= 3) return d;
  if (d.length <= 7) return d.slice(0,3) + '-' + d.slice(3);
  if (d.length <= 10) return d.slice(0,3) + '-' + d.slice(3,6) + '-' + d.slice(6);
  return d.slice(0,3) + '-' + d.slice(3,7) + '-' + d.slice(7);
}

function onContactInput(id, el) {
  const formatted = formatPhone(el.value);
  el.value = formatted;
  updateRowField(id, 'contact', formatted);
}

function updateRowField(id, field, value) {
  const row = rows.find(r => r.id === id);
  if (!row) return;
  row[field] = value;
  saveData();
  autoSync(id);
}

function updateStatusCell(id) {
  const row = rows.find(r => r.id === id);
  const cell = document.getElementById(`status-cell-${id}`);
  if (row && cell) cell.innerHTML = statusBadge(row);
}

function changeRowQty(id, delta) {
  const row = rows.find(r => r.id === id);
  if (!row) return;
  const used = getUsed();
  const remain = TOTAL - used;
  const newQty = (row.qty || 0) + delta;
  if (newQty < 0) return;
  if (newQty > MAX_PER) { showToast('1인 최대 5장까지 배분 가능합니다.', 'error'); return; }
  if (delta > 0 && remain <= 0) { showToast('남은 티켓이 없습니다!', 'error'); return; }
  row.qty = newQty;
  saveData();
  refreshAllQtyBtns();
  updateStatusCell(id);
  autoSync(id);
}

function refreshAllQtyBtns() {
  const used = getUsed();
  const remain = TOTAL - used;
  rows.forEach(row => {
    const wrap = document.getElementById(`qty-wrap-${row.id}`);
    if (!wrap) return;
    const canAdd = remain > 0 && row.qty < MAX_PER;
    const canSub = row.qty > 0;
    wrap.innerHTML = `
      <button class="qty-btn" onclick="changeRowQty(${row.id}, -1)" ${canSub ? '' : 'disabled'}>−</button>
      <span class="qty-num">${row.qty}</span>
      <button class="qty-btn" onclick="changeRowQty(${row.id}, 1)" ${canAdd ? '' : 'disabled'}>+</button>
    `;
  });
}

function deleteRow(id) {
  if (rows.length === 1) { showToast('최소 1행은 있어야 합니다.', 'error'); return; }
  const row = rows.find(r => r.id === id);
  rows = rows.filter(r => r.id !== id);
  const tr = document.getElementById(`tr-${id}`);
  if (tr) tr.remove();
  refreshRowNumbers();
  saveData();
  refreshAllQtyBtns();
  // 이름이 있는 행만 구글 시트에서 삭제
  if (row && row.name) {
    fetch(DEFAULT_SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'delete', name: row.name })
    }).catch(() => {});
  }
}

function refreshRowNumbers() {
  rows.forEach((row, idx) => {
    const el = document.getElementById(`num-${row.id}`);
    if (el) el.textContent = idx + 1;
  });
}

/* ─── Google Sheets 실시간 자동저장 ─── */
const syncTimers = {};

function getScriptUrl() {
  return DEFAULT_SCRIPT_URL;
}

function autoSync(id) {
  clearTimeout(syncTimers[id]);
  syncTimers[id] = setTimeout(() => syncRow(id), 800);
}

async function syncRow(id) {
  const row = rows.find(r => r.id === id);
  if (!row || !row.name) return; // 이름 없으면 전송 안 함
  const url = getScriptUrl();
  const payload = {
    action: 'upsert',
    dept: row.dept, name: row.name,
    recipient: row.recipient || '', contact: row.contact || '',
    qty: row.qty, timestamp: new Date().toLocaleString('ko-KR')
  };
  try {
    await fetch(url, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
  } catch(e) {}
}

/* ─── Toast ─── */
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  const icon = type === 'success' ? 'ti-check' : type === 'error' ? 'ti-alert-circle' : 'ti-info-circle';
  t.innerHTML = `<i class="ti ${icon}" aria-hidden="true" style="font-size:14px;"></i> ${msg}`;
  t.className = `toast ${type} show`;
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

/* ─── Init ─── */
const DEFAULT_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxy3m0U5N_iaABIAP16xgz9nfyH6VYrK2g_x0NdNcK6aZvfz2aN8qjpbAlQX3roqeSWsQ/exec';
initData();
renderAll();
</script>
